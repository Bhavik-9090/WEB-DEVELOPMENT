<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<header class="header">
    <h1>e-Ticket Booking</h1>
</header>

<div class="seat-container">
    <h2>Select Your Seats</h2>

    <div class="screen">SCREEN</div>

   <div class="seats">

    <!-- Row A -->
    <div class="row">
        <span>A</span>
        <div class="seat">A1</div><div class="seat">A2</div><div class="seat">A3</div><div class="seat">A4</div><div class="seat">A5</div>
        <div class="seat">A6</div><div class="seat">A7</div><div class="seat">A8</div><div class="seat">A9</div><div class="seat">A10</div>
    </div>

    <!-- Row B -->
    <div class="row">
        <span>B</span>
        <div class="seat">B1</div><div class="seat">B2</div><div class="seat occupied">B3</div><div class="seat">B4</div><div class="seat">B5</div>
        <div class="seat">B6</div><div class="seat">B7</div><div class="seat">B8</div><div class="seat">B9</div><div class="seat">B10</div>
    </div>

    <!-- Row C -->
    <div class="row">
        <span>C</span>
        <div class="seat">C1</div><div class="seat">C2</div><div class="seat">C3</div><div class="seat">C4</div><div class="seat">C5</div>
        <div class="seat occupied">C6</div><div class="seat">C7</div><div class="seat">C8</div><div class="seat">C9</div><div class="seat">C10</div>
    </div>

    <!-- Row D -->
    <div class="row">
        <span>D</span>
        <div class="seat">D1</div><div class="seat">D2</div><div class="seat">D3</div><div class="seat">D4</div><div class="seat">D5</div>
        <div class="seat">D6</div><div class="seat">D7</div><div class="seat">D8</div><div class="seat">D9</div><div class="seat">D10</div>
    </div>

    <!-- Row E -->
    <div class="row">
        <span>E</span>
        <div class="seat">E1</div><div class="seat">E2</div><div class="seat">E3</div><div class="seat">E4</div><div class="seat">E5</div>
        <div class="seat">E6</div><div class="seat occupied">E7</div><div class="seat">E8</div><div class="seat">E9</div><div class="seat">E10</div>
    </div>

    <!-- Row F -->
    <div class="row">
        <span>F</span>
        <div class="seat">F1</div><div class="seat">F2</div><div class="seat">F3</div><div class="seat">F4</div><div class="seat">F5</div>
        <div class="seat">F6</div><div class="seat">F7</div><div class="seat">F8</div><div class="seat">F9</div><div class="seat">F10</div>
    </div>

</div>
    <p>
        Selected Seats: <span id="count">0</span> |
        Total Price: ₹<span id="total">0</span>
    </p>

    <button onclick="window.location.href='payment.html'">Proceed</button>
</div>

<script src="script.js"></script>
</body>
</html>
