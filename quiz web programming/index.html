<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skill Check Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>WEB QUIZ</h1>
    <p>Check how strong your web basics are 🚀</p>
</header>

<main class="container">

    <section id="quiz-box">
        <p id="progress">Question 1 of 3</p>
        <h2 id="question-text"></h2>

        <div id="options-box">
            <!-- Buttons generated by JS -->
        </div>

        <button id="next-btn" disabled>Next</button>
    </section>

    <section id="result-box" class="Hidden">
        <h2>Quiz Result</h2>
        <p id="final-score"></p>
        <p id="final-message"></p>
        <button id="restart-btn">Restart Quiz</button>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
